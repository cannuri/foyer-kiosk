<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1920, initial-scale=1.0">
    <title>Funkhaus Wien — Foyer Kiosk</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        /* ── FONTS ── */
        @font-face {
            font-family: 'Power Grotesk';
            src: url('fonts/PowerGrotesk-Regular.woff2') format('woff2');
            font-weight: 400;
            font-style: normal;
            font-display: block;
        }
        @font-face {
            font-family: 'Power Grotesk';
            src: url('fonts/PowerGrotesk-Light.woff2') format('woff2');
            font-weight: 300;
            font-style: normal;
            font-display: block;
        }
        @font-face {
            font-family: 'Lay Grotesk';
            src: url('fonts/LayGrotesk-Regular.woff2') format('woff2');
            font-weight: 400;
            font-style: normal;
            font-display: block;
        }

        /* ── RESET ── */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --void: #1A1A1A;
            --deep: #111111;
            --dim: #2A2A2A;
            --stone: #3A3A3A;
            --muted: #6A6A6A;
            --cream: #F5F0EB;
            --white: #F2F2F2;
            --red: #E63946;
            --gold: #C9A050;
            --brass: #B09040;

            --font-display: 'Power Grotesk', Arial, 'Helvetica Neue', sans-serif;
            --font-body: 'Lay Grotesk', 'Helvetica Neue', Arial, sans-serif;
        }

        html, body {
            width: 100%;
            height: 100%;
            background: var(--void);
            color: var(--cream);
            font-family: var(--font-body);
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* ── FILM GRAIN ── */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            opacity: 0.035;
            pointer-events: none;
            z-index: 9999;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            mix-blend-mode: overlay;
        }

        /* ── SCANLINE ── */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0,0,0,0.02) 2px,
                rgba(0,0,0,0.02) 4px
            );
            pointer-events: none;
            z-index: 9998;
        }

        /* ── TOP BAR ── */
        #topbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            padding: 28px 48px 40px;
            background: none;
        }

        #logo-block {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        #logo {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        #logo .pulse {
            width: 10px;
            height: 10px;
            background: var(--red);
            animation: pulse 2.4s ease-in-out infinite;
            flex-shrink: 0;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.15; }
        }

        #topbar-subtitle {
            font-family: var(--font-body);
            font-size: 13px;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--muted);
            padding-left: 24px;
        }

        #clock {
            font-family: var(--font-display);
            font-size: 13px;
            color: var(--muted);
            letter-spacing: 0.06em;
            text-align: right;
            line-height: 1.6;
        }

        #clock .time {
            font-size: 36px;
            font-weight: 300;
            color: var(--cream);
            display: block;
            letter-spacing: 0.02em;
        }

        #date-display {
            display: block;
            font-family: var(--font-body);
            font-size: 12px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }

        /* Toggle buttons removed for kiosk mode */

        /* ══════════════════════════════
           SLIDER VIEW
           ══════════════════════════════ */
        #slider-view {
            position: fixed;
            inset: 0;
        }

        .slide {
            position: absolute;
            inset: 0;
            display: grid;
            grid-template-columns: 1fr 1fr;
            opacity: 0;
            transform: translateX(30px);
            transition:
                opacity 0.9s cubic-bezier(0.4,0,0.2,1),
                transform 0.9s cubic-bezier(0.4,0,0.2,1);
            pointer-events: none;
        }

        .slide.active {
            opacity: 1;
            transform: translateX(0);
            pointer-events: auto;
        }

        .slide.exit {
            opacity: 0;
            transform: translateX(-30px);
        }

        /* ── SLIDE LEFT: Event Info ── */
        .slide-left {
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 100px 64px 120px 64px;
            position: relative;
            z-index: 2;
            background: var(--deep);
        }

        /* Gold accent line */
        .slide-left::before {
            content: '';
            position: absolute;
            left: 48px;
            top: 22%;
            bottom: 22%;
            width: 1px;
            background: linear-gradient(
                to bottom,
                transparent,
                var(--gold) 20%,
                var(--gold) 80%,
                transparent
            );
            opacity: 0.4;
        }

        /* Ambient warm glow */
        .slide-left::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 60%;
            background: radial-gradient(
                ellipse 80% 60% at 30% 100%,
                rgba(201,160,80,0.03),
                transparent 70%
            );
            pointer-events: none;
        }

        .slide-date {
            position: absolute;
            top: 100px;
            left: 64px;
            font-family: var(--font-display);
            font-weight: 300;
            font-size: 52px;
            color: var(--red);
            letter-spacing: -0.02em;
            line-height: 1;
        }

        .slide-tag {
            font-family: var(--font-body);
            font-size: 11px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .slide-tag::after {
            content: '';
            display: block;
            width: 48px;
            height: 1px;
            background: var(--gold);
            opacity: 0.6;
        }

        .slide-title {
            font-family: var(--font-display);
            font-weight: 300;
            font-size: clamp(32px, 4vw, 68px);
            line-height: 1.05;
            color: var(--cream);
            margin-bottom: 24px;
            letter-spacing: -0.015em;
        }

        .slide-desc {
            font-family: var(--font-body);
            font-size: 18px;
            color: rgba(245,240,235,0.5);
            line-height: 1.7;
            max-width: 500px;
            margin-bottom: 40px;
            letter-spacing: 0.01em;
        }

        .slide-meta {
            display: flex;
            gap: 56px;
            flex-wrap: wrap;
        }

        .meta-label {
            font-family: var(--font-body);
            font-size: 10px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 6px;
        }

        .meta-value {
            font-family: var(--font-display);
            font-weight: 300;
            font-size: 28px;
            color: var(--cream);
            letter-spacing: 0.01em;
        }

        .meta-value.secondary {
            font-family: var(--font-body);
            font-size: 16px;
            color: var(--muted);
            letter-spacing: 0.03em;
        }

        /* ── SLIDE RIGHT: Event Image + QR ── */
        .slide-right {
            position: relative;
            overflow: hidden;
        }

        .slide-image {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            filter: brightness(0.45) contrast(1.15) saturate(0.85);
            transition: transform 12s ease-out;
        }

        .slide.active .slide-image {
            transform: scale(1.04);
        }

        /* Vignette */
        .slide-right::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(
                ellipse 100% 100% at 50% 50%,
                transparent 40%,
                rgba(17,17,17,0.7) 100%
            );
            z-index: 1;
        }

        /* Left edge fade to info panel */
        .slide-right::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            width: 120px;
            background: linear-gradient(to right, var(--deep), transparent);
            z-index: 2;
        }

        /* QR code overlay — bottom right corner */
        .slide-qr-overlay {
            position: absolute;
            bottom: 48px;
            right: 48px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .qr-box {
            padding: 12px;
            background: var(--cream);
        }

        .qr-box canvas,
        .qr-box img {
            display: block;
        }

        .qr-label {
            font-family: var(--font-body);
            font-size: 10px;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: rgba(245,240,235,0.45);
            text-align: center;
        }

        .qr-cta {
            font-family: var(--font-display);
            font-weight: 400;
            font-size: 14px;
            color: var(--cream);
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }

        /* Ghost event number */
        .slide-num {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: var(--font-display);
            font-weight: 300;
            font-size: 28vw;
            color: rgba(255,255,255,0.025);
            line-height: 1;
            pointer-events: none;
            user-select: none;
            z-index: 3;
        }

        /* ── PROGRESS ── */
        #progress-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: rgba(255,255,255,0.06);
            z-index: 300;
        }

        #progress-fill {
            height: 100%;
            background: var(--red);
            width: 0%;
            transition: width linear;
        }

        /* ── DOTS ── */
        #dots {
            position: fixed;
            bottom: 40px;
            left: 64px;
            z-index: 200;
            display: flex;
            gap: 5px;
            align-items: center;
        }

        .dot-item {
            width: 20px;
            height: 2px;
            background: rgba(255,255,255,0.15);
            cursor: pointer;
            transition: all 0.4s ease;
        }

        .dot-item.active {
            width: 44px;
            background: var(--cream);
        }

        /* ══════════════════════════════
           GRID VIEW
           ══════════════════════════════ */
        #grid-view {
            display: none;
            position: fixed;
            inset: 0;
            overflow-y: auto;
            padding: 110px 48px 120px;
            background: var(--void);
        }

        #grid-view::-webkit-scrollbar {
            width: 3px;
        }
        #grid-view::-webkit-scrollbar-track {
            background: var(--void);
        }
        #grid-view::-webkit-scrollbar-thumb {
            background: var(--stone);
        }

        .grid-header {
            font-family: var(--font-body);
            font-size: 10px;
            letter-spacing: 0.22em;
            color: var(--muted);
            text-transform: uppercase;
            margin-bottom: 36px;
            padding-bottom: 14px;
            border-bottom: 1px solid var(--dim);
            display: flex;
            justify-content: space-between;
        }

        .events-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 2px;
        }

        .event-card {
            background: var(--dim);
            position: relative;
            overflow: hidden;
            cursor: default;
            transition: background 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .event-card:hover {
            background: var(--stone);
        }

        .event-card:hover .card-image {
            transform: scale(1.03);
        }

        /* Card image */
        .card-image-wrap {
            width: 100%;
            height: 200px;
            position: relative;
            overflow: hidden;
            flex-shrink: 0;
        }

        .card-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(0.5) contrast(1.1) saturate(0.8);
            transition: transform 0.6s ease;
        }

        /* Card QR overlay */
        .card-qr-overlay {
            position: absolute;
            bottom: 10px;
            right: 10px;
            z-index: 5;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .card-qr-box {
            padding: 6px;
            background: var(--cream);
        }

        .card-qr-box canvas,
        .card-qr-box img {
            display: block;
        }

        .card-qr-hint {
            font-family: var(--font-body);
            font-size: 8px;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.35);
        }

        /* Gradient over card image */
        .card-image-wrap::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 60%;
            background: linear-gradient(to top, var(--dim), transparent);
            z-index: 2;
        }

        .card-color-bar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            z-index: 10;
        }

        .card-body {
            padding: 16px 20px 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .card-type {
            font-family: var(--font-body);
            font-size: 9px;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 6px;
        }

        .card-title {
            font-family: var(--font-display);
            font-weight: 400;
            font-size: 17px;
            line-height: 1.2;
            color: var(--cream);
            margin-bottom: 4px;
            letter-spacing: -0.01em;
        }

        .card-subtitle {
            font-family: var(--font-body);
            font-size: 12px;
            color: var(--muted);
            line-height: 1.4;
            margin-bottom: 6px;
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-top: 12px;
            padding-top: 10px;
            border-top: 1px solid rgba(255,255,255,0.06);
        }

        .card-date {
            font-family: var(--font-display);
            font-weight: 400;
            font-size: 13px;
            color: var(--cream);
            letter-spacing: 0.02em;
        }

        .card-time {
            font-family: var(--font-body);
            font-size: 11px;
            color: var(--muted);
            text-align: right;
            line-height: 1.4;
        }

        /* ── AMBIENT GLOW ── */
        .ambient-glow {
            position: absolute;
            top: -20%;
            right: -20%;
            width: 80%;
            height: 80%;
            background: radial-gradient(
                ellipse at center,
                rgba(201,160,80,0.04),
                transparent 70%
            );
            pointer-events: none;
            z-index: 0;
        }
    </style>
</head>

    <!-- DOTS -->

    {
        id: 252,
        title: "Jatun Risba: not as it appears",
        tag: "Finissage",
        type: "Art & Science Conversation",
        date: "20.04.2026",
        time: "19:00\u201321:00",
        desc: "Finissage \u2014 Art & Science Conversation closing the exhibition.",
        url: ODOO_BASE + "/event/jatun-risba-not-as-it-appears-252/register",
        img: "images/event-252.jpg"
    }
];

// ══════════════════════════════
// HELPERS
// ══════════════════════════════
function odooImageUrl(eventId) {
    return ODOO_BASE + '/web/image/event.event/' + eventId + '/image_1920';
}

function makeQR(url, size) {
    const wrap = document.createElement('div');
    new QRCode(wrap, {
        text: url,
        width: size,
        height: size,
        colorDark: '#1A1A1A',
        colorLight: '#F5F0EB',
        correctLevel: QRCode.CorrectLevel.M
    });
    return wrap;
}

// Image URL: local event image downloaded from Odoo
function getImageUrl(evt) {
    return evt.img;
}

// ══════════════════════════════
// RENDER
// ══════════════════════════════
const INTERVAL = 10000;
let current = 0, timer = null, view = 'slider';

const sliderEl = document.getElementById('slider-view');
const dotsEl = document.getElementById('dots');
const progressFill = document.getElementById('progress-fill');
const gridEl = document.getElementById('events-grid');

document.getElementById('grid-count').textContent = EVENTS.length + ' Events';

EVENTS.forEach((evt, i) => {
    // ── SLIDE ──
    const slide = document.createElement('div');
    slide.className = 'slide' + (i === 0 ? ' active' : '');

    // Left panel
    const left = document.createElement('div');
    left.className = 'slide-left';
    left.innerHTML =
        '<div class="slide-date">' + evt.date + '</div>' +
        '<div class="slide-tag">' + evt.tag + '</div>' +
        '<h1 class="slide-title">' + evt.title + '</h1>' +
        '<p class="slide-desc">' + evt.desc + '</p>' +
        '<div class="slide-meta">' +
            '<div><div class="meta-label">Zeit</div><div class="meta-value">' + evt.time + '</div></div>' +
            '<div><div class="meta-label">Format</div><div class="meta-value secondary">' + evt.type + '</div></div>' +
        '</div>';

    // Right panel — event image
    const right = document.createElement('div');
    right.className = 'slide-right';

    const imageDiv = document.createElement('div');
    imageDiv.className = 'slide-image';
    imageDiv.style.backgroundImage = 'url(' + getImageUrl(evt) + ')';

    // QR overlay on image
    const qrOverlay = document.createElement('div');
    qrOverlay.className = 'slide-qr-overlay';

    const qrBox = document.createElement('div');
    qrBox.className = 'qr-box';
    qrBox.appendChild(makeQR(evt.url, 140));

    const cta = document.createElement('div');
    cta.className = 'qr-cta';
    cta.textContent = 'Tickets';

    const label = document.createElement('div');
    label.className = 'qr-label';
    label.textContent = 'Scan to register';

    qrOverlay.appendChild(qrBox);
    qrOverlay.appendChild(cta);
    qrOverlay.appendChild(label);

    // Ghost number
    const num = document.createElement('div');
    num.className = 'slide-num';
    num.textContent = String(i + 1).padStart(2, '0');

    right.appendChild(imageDiv);
    right.appendChild(qrOverlay);
    right.appendChild(num);

    slide.appendChild(left);
    slide.appendChild(right);
    sliderEl.appendChild(slide);

    // ── DOT ──
    const dot = document.createElement('div');
    dot.className = 'dot-item' + (i === 0 ? ' active' : '');
    dot.onclick = function() { goTo(i); };
    dotsEl.appendChild(dot);

    // ── GRID CARD ──
    const card = document.createElement('div');
    card.className = 'event-card';

    // Color bar
    const bar = document.createElement('div');
    bar.className = 'card-color-bar';
    bar.style.background = 'var(--red)';

    // Image
    const imgWrap = document.createElement('div');
    imgWrap.className = 'card-image-wrap';

    const cardImg = document.createElement('img');
    cardImg.className = 'card-image';
    cardImg.alt = evt.title;
    cardImg.src = getImageUrl(evt);
    cardImg.loading = 'lazy';

    // Card QR overlay
    const cardQrOverlay = document.createElement('div');
    cardQrOverlay.className = 'card-qr-overlay';

    const cardQrBox = document.createElement('div');
    cardQrBox.className = 'card-qr-box';
    cardQrBox.appendChild(makeQR(evt.url, 64));

    const cardQrHint = document.createElement('div');
    cardQrHint.className = 'card-qr-hint';
    cardQrHint.textContent = 'Scan';

    cardQrOverlay.appendChild(cardQrBox);
    cardQrOverlay.appendChild(cardQrHint);

    imgWrap.appendChild(cardImg);
    imgWrap.appendChild(cardQrOverlay);

    // Body
    const body = document.createElement('div');
    body.className = 'card-body';

    const subtitleHtml = evt.subtitle
        ? '<div class="card-subtitle">' + evt.subtitle + '</div>'
        : '';

    body.innerHTML =
        '<div>' +
            '<div class="card-type">' + evt.tag + '</div>' +
            '<div class="card-title">' + evt.title + '</div>' +
            subtitleHtml +
        '</div>' +
        '<div class="card-footer">' +
            '<div class="card-date">' + evt.date + '</div>' +
            '<div class="card-time">' + evt.time + '</div>' +
        '</div>';

    card.appendChild(bar);
    card.appendChild(imgWrap);
    card.appendChild(body);
    gridEl.appendChild(card);
});

// ══════════════════════════════
// NAVIGATION
// ══════════════════════════════
function slides() { return sliderEl.querySelectorAll('.slide'); }
function dotItems() { return dotsEl.querySelectorAll('.dot-item'); }

function goTo(idx) {
    const sl = slides(), dt = dotItems();
    if (sl.length === 0) return;

    sl[current].classList.remove('active');
    sl[current].classList.add('exit');
    var prev = current;
    setTimeout(function() { sl[prev].classList.remove('exit'); }, 900);

    dt[current].classList.remove('active');
    current = ((idx % sl.length) + sl.length) % sl.length;
    sl[current].classList.add('active');
    dt[current].classList.add('active');
    restartProgress();
}

function next() { goTo(current + 1); }

function restartProgress() {
    progressFill.style.transition = 'none';
    progressFill.style.width = '0%';
    requestAnimationFrame(function() {
        requestAnimationFrame(function() {
            progressFill.style.transition = 'width ' + INTERVAL + 'ms linear';
            progressFill.style.width = '100%';
        });
    });
}

function startAuto() {
    clearInterval(timer);
    timer = setInterval(next, INTERVAL);
    restartProgress();
}

startAuto();

// ══════════════════════════════
// CLOCK
// ══════════════════════════════
const DAYS_DE = ['So', 'Mo', 'Di', 'Mi', 'Do', 'Fr', 'Sa'];
const MONTHS_DE = ['Jänner', 'Februar', 'März', 'April', 'Mai', 'Juni', 'Juli', 'August', 'September', 'Oktober', 'November', 'Dezember'];

function tick() {
    var n = new Date();
    document.getElementById('time-display').textContent =
        String(n.getHours()).padStart(2,'0') + ':' +
        String(n.getMinutes()).padStart(2,'0');
    document.getElementById('date-display').textContent =
        DAYS_DE[n.getDay()] + ', ' + n.getDate() + '. ' + MONTHS_DE[n.getMonth()] + ' ' + n.getFullYear();
}
tick();
setInterval(tick, 1000);

// ══════════════════════════════
// VIEW TOGGLE
// ══════════════════════════════
function setView(v) {
    view = v;
    document.getElementById('slider-view').style.display = v === 'slider' ? 'block' : 'none';
    document.getElementById('grid-view').style.display = v === 'grid' ? 'block' : 'none';
    document.getElementById('dots').style.display = v === 'slider' ? 'flex' : 'none';
    document.getElementById('progress-bar').style.display = v === 'slider' ? 'block' : 'none';
    document.getElementById('btn-slider').classList.toggle('active', v === 'slider');
    document.getElementById('btn-grid').classList.toggle('active', v === 'grid');
    if (v === 'slider') startAuto();
    else clearInterval(timer);
}

// ══════════════════════════════
// KEYBOARD
// ══════════════════════════════
document.addEventListener('keydown', function(e) {
    if ((e.key === 'ArrowRight' || e.key === ' ') && view === 'slider') {
        next(); clearInterval(timer); startAuto();
    }
    if (e.key === 'ArrowLeft' && view === 'slider') {
        goTo(current - 1); clearInterval(timer); startAuto();
    }
    if (e.key === 'g') setView('grid');
    if (e.key === 's') setView('slider');
});

// Auto-switch: slider 60s, grid 30s, repeat
var autoViewTimer = null;
function startAutoViewCycle() {
    clearTimeout(autoViewTimer);
    function cycle() {
        if (view === 'slider') {
            autoViewTimer = setTimeout(function() {
                setView('grid');
                autoViewTimer = setTimeout(function() {
                    setView('slider');
                    cycle();
                }, 30000);
            }, 90000);
        }
    }
    cycle();
}
startAutoViewCycle();
</script>
</body>
</html>
